<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso bloqueado</title>
  <meta name="description" content="Esta plataforma ha caducado. Contacta con el propietario para renovar el acceso.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg-light: #eef2f6;
      --bg-dark: #1a2634;
      --card-light: #ffffff;
      --card-dark: #1e2b39;
      --text-light: #1a2b3f;
      --text-dark: #e3eaf1;
      --text-muted-light: #4a5f82;
      --text-muted-dark: #9fb0cc;
      --accent-light: #1f3c6b;
      --accent-dark: #3466aa;
      --border-light: #d9e2ef;
      --border-dark: #2b3a4a;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 2rem;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
      color: var(--text-light);
    }
    .contenedor-central {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
    .tarjeta {
      background: var(--card-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 3rem 2rem;
      border: 1px solid var(--border-light);
    }
    .mensaje-acceso {
      font-size: 1.1rem;
      color: var(--text-light);
      background: #f0f5fe;
      padding: 1rem 2rem;
      border-radius: 3rem;
      max-width: 500px;
      margin: 0 auto 2rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border: 1px solid var(--border-light);
    }
    .bloque-contacto {
      background: #f8fcff;
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      border: 1px solid var(--border-light);
      text-align: center;
    }
    .bloque-contacto p {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 1.5rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .bloque-contacto p i {
      color: var(--accent-light);
    }
    .btn-contacto {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      background: var(--accent-light);
      color: white;
      text-decoration: none;
      padding: 0.9rem 2.2rem;
      border-radius: 3rem;
      font-size: 1.2rem;
      font-weight: 500;
      border: none;
      box-shadow: 0 4px 10px rgba(31, 60, 107, 0.3);
      width: fit-content;
      margin: 0 auto;
    }
    .btn-contacto i {
      font-size: 1.2rem;
    }
    .btn-contacto:focus-visible {
      outline: 3px solid var(--accent-light);
      outline-offset: 3px;
    }
    @media (max-width: 480px) {
      .tarjeta {
        padding: 2rem 1.2rem;
      }
      .mensaje-acceso {
        font-size: 1rem;
        padding: 0.8rem 1.2rem;
      }
      .btn-contacto {
        padding: 0.8rem 1.8rem;
        font-size: 1.1rem;
      }
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: var(--bg-dark);
        color: var(--text-dark);
      }
      .tarjeta {
        background: var(--card-dark);
        border-color: var(--border-dark);
      }
      .mensaje-acceso {
        background: #1f2e3f;
        color: var(--text-dark);
        border-color: var(--border-dark);
      }
      .bloque-contacto {
        background: #1b2735;
        border-color: var(--border-dark);
      }
      .bloque-contacto p {
        color: var(--text-dark);
      }
      .bloque-contacto p i {
        color: var(--accent-dark);
      }
      .btn-contacto {
        background: var(--accent-dark);
        box-shadow: 0 4px 10px #1e3b5c;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor-central">
    <article class="tarjeta" role="main">
      <section>
        <p class="mensaje-acceso">
          <i class="fas fa-lock" aria-hidden="true"></i> 
          No puedes visualizar el contenido porque esta plataforma ha expirado.
        </p>
      </section>
      <section class="bloque-contacto">
        <p>
          <i class="fas fa-envelope-open-text" aria-hidden="true"></i> 
          Contacta con el propietario de la web
        </p>
        <a href="tel:+5363228179" class="btn-contacto" aria-label="Llamar al propietario +53 63228179">
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
          +53 58692631
        </a>
      </section>
    </article>
  </div>
</body>
</html>
